name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: photomagic/frontend/package-lock.json

      - name: Install dependencies
        working-directory: photomagic/frontend
        run: npm ci

      - name: Build
        working-directory: photomagic/frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_APP_TITLE: PhotoMagic Studio
          VITE_APP_VERSION: 1.0.0
          # 从 GitHub Secrets 读取敏感信息
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GOOGLE_ANALYTICS_ID: ${{ secrets.VITE_GOOGLE_ANALYTICS_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'photomagic-studio'
          directory: 'photomagic/frontend/dist'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # 如果是生产环境部署
          branch: main