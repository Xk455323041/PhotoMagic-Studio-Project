# Cloudflare Pages config for PhotoMagic frontend
# Note: the BUCKET R2 binding must be configured in the Cloudflare Pages dashboard
# under Settings -> Bindings for this Pages project.

name = "photomagic-studio"
compatibility_date = "2024-03-24"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm install && npm run build"
output_dir = "dist"

[vars]
NODE_VERSION = "18"
NODE_ENV = "production"
