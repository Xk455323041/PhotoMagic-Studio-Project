# Cloudflare Pages 配置文件
# 放置在前端项目根目录

name: photomagic-studio
production_branch: main
compatibility_date: "2024-03-24"
compatibility_flags:
  - "nodejs_compat"

# 构建配置
build:
  command: npm install && npm run build
  output_dir: dist
  root_dir: .

# 环境变量
vars:
  NODE_VERSION: "18"
  NODE_ENV: "production"

# 路由配置
routes:
  - pattern: /*
    file: /dist/index.html
    status: 200

# 自定义域名（可选）
# domains:
#   - photomagic.example.com

# 重定向（可选）
# redirects:
#   - from: /old-path
#     to: /new-path
#     status: 301